name: "Setup DynaPyt"
description: "Install DynaPyt, instrument code, and configure analysis for CI tests."
author: "CIntent"
branding:
  icon: "git-merge"
  color: "blue"

inputs:
  directory:
    description: "Directory to instrument (relative to workspace root)."
    required: true
  analysis:
    description: "DynaPyt analysis class (full dotted path)."
    required: false
    default: "dynapyt.analyses.CallGraph.CallGraph"
  dynapyt_path:
    description: "Git URL or local path to install DynaPyt from. Leave empty to install from PyPI."
    required: false
    default: "git+https://github.com/sola-st/DynaPyt.git"

runs:
  using: "composite"
  steps:
    - name: Install DynaPyt
      shell: bash
      run: |
        if [ -n "${{ inputs.dynapyt_path }}" ]; then
          pip install "${{ inputs.dynapyt_path }}"
        else
          pip install dynapyt
        fi
        pip install libcst 2>/dev/null || true

    - name: Patch CallGraph logging
      shell: bash
      run: |
        CALLGRAPH=$(python -c "import dynapyt.analyses.CallGraph; print(dynapyt.analyses.CallGraph.__file__)")
        if grep -q 'logging.basicConfig(' "$CALLGRAPH" && ! grep -q 'force=True' "$CALLGRAPH"; then
          sed -i 's/logging.basicConfig(/logging.basicConfig(force=True, /' "$CALLGRAPH"
          echo "[dynapyt] Patched CallGraph with force=True"
        fi

    - name: Instrument
      shell: bash
      run: |
        python -m dynapyt.run_instrumentation \
          --directory "${{ inputs.directory }}" \
          --analysis ${{ inputs.analysis }}

    - name: Configure DynaPyt session
      shell: bash
      run: |
        # Pre-configure the DynaPyt session.
        # When the instrumented code is imported during tests, RuntimeEngine
        # reads DYNAPYT_SESSION_ID and loads the analysis from the temp file.
        # The analysis hooks fire automatically. On process exit, atexit calls
        # end_execution() which writes dynapyt.json to the working directory.
        SESSION_ID=$(python -c "import uuid; print(uuid.uuid4())")
        TMPDIR=$(python -c "from tempfile import gettempdir; print(gettempdir())")
        echo "${{ inputs.analysis }}" > "$TMPDIR/dynapyt_analyses-$SESSION_ID.txt"

        echo "DYNAPYT_SESSION_ID=$SESSION_ID" >> "$GITHUB_ENV"
        echo "DYNAPYT_ANALYSIS=${{ inputs.analysis }}" >> "$GITHUB_ENV"

        DYNAPYT_LOGS=/home/runner/dynapyt/log
        mkdir -p "$DYNAPYT_LOGS"
        echo "DYNAPYT_LOGS=$DYNAPYT_LOGS" >> "$GITHUB_ENV"

        echo "[dynapyt] Session $SESSION_ID ready."
        echo "[dynapyt] Just run your tests — instrumented code will trigger the analysis."
        echo "[dynapyt] Output: dynapyt.json (in working directory)"
